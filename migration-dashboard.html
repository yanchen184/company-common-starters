<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wez-grails5 遷移儀表板</title>
<style>
  :root { --primary: #4f46e5; --success: #16a34a; --danger: #dc2626; --warning: #d97706; --skip: #6b7280; --bg: #f3f4f6; --surface: #fff; --text: #111827; --text2: #6b7280; --border: #e5e7eb; --radius: 8px; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 24px; margin-bottom: 4px; }
  .subtitle { color: var(--text2); font-size: 14px; margin-bottom: 24px; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border-radius: var(--radius); padding: 16px; border: 1px solid var(--border); text-align: center; }
  .stat-num { font-size: 32px; font-weight: 700; }
  .stat-label { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .progress-wrap { background: var(--surface); border-radius: var(--radius); padding: 16px; border: 1px solid var(--border); margin-bottom: 24px; }
  .progress-bar { height: 24px; border-radius: 12px; background: #e5e7eb; overflow: hidden; display: flex; }
  .progress-bar .done { background: var(--success); }
  .progress-bar .skip { background: #d1d5db; }
  .progress-bar .pending { background: #fde68a; }
  .progress-legend { display: flex; gap: 16px; margin-top: 8px; font-size: 12px; color: var(--text2); }
  .progress-legend span::before { content: ''; display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
  .progress-legend .l-done::before { background: var(--success); }
  .progress-legend .l-skip::before { background: #d1d5db; }
  .progress-legend .l-pending::before { background: #fde68a; }
  .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filters button { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; cursor: pointer; transition: all .15s; }
  .filters button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .filters button:hover:not(.active) { border-color: var(--primary); color: var(--primary); }
  .table-wrap { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { background: #f9fafb; text-align: left; padding: 10px 14px; font-weight: 600; font-size: 13px; color: var(--text2); border-bottom: 1px solid var(--border); }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover { background: #f9fafb; }
  tr.clickable { cursor: pointer; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .badge-done { background: #dcfce7; color: #166534; }
  .badge-skip { background: #f3f4f6; color: #6b7280; }
  .badge-pending { background: #fef3c7; color: #92400e; }
  .badge-complex { background: #fef2f2; color: #991b1b; }
  .badge-medium { background: #fff7ed; color: #9a3412; }
  .badge-simple { background: #f0fdf4; color: #166534; }
  .group-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }

  /* Modal */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 100; animation: fadeIn .2s; }
  .modal { background: var(--surface); border-radius: 12px; width: 92%; max-width: 780px; max-height: 88vh; overflow-y: auto; padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,.2); animation: slideUp .25s; }
  .modal h2 { font-size: 20px; margin-bottom: 4px; }
  .modal .modal-sub { color: var(--text2); font-size: 13px; margin-bottom: 16px; }
  .modal .close-btn { position: sticky; top: 0; float: right; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text2); padding: 0 4px; z-index: 10; }
  .modal .close-btn:hover { color: var(--text); }
  .modal section { margin-bottom: 16px; }
  .modal section h3 { font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--primary); }
  .modal section p, .modal section li { font-size: 14px; line-height: 1.7; color: #374151; }
  .modal ul { padding-left: 20px; }
  .modal .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .modal .info-item { background: #f9fafb; padding: 10px 12px; border-radius: 6px; }
  .modal .info-item dt { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
  .modal .info-item dd { font-size: 14px; font-weight: 500; margin-top: 2px; }
  .modal code { background: #f3f4f6; padding: 1px 6px; border-radius: 4px; font-size: 13px; }
  .modal .dep-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .modal .dep-tag { background: #ede9fe; color: #5b21b6; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
  .modal .rec-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 6px; padding: 12px; font-size: 14px; line-height: 1.7; }
  .modal .improve-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px; padding: 12px; font-size: 14px; line-height: 1.7; }

  /* Tabs inside modal */
  .modal-tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 16px; }
  .modal-tabs button { padding: 8px 16px; border: none; border-bottom: 2px solid transparent; background: none; font-size: 14px; cursor: pointer; color: var(--text2); margin-bottom: -2px; transition: all .15s; font-weight: 500; }
  .modal-tabs button.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
  .modal-tabs button:hover:not(.active) { color: var(--text); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

    <div class="progress-bar" id="progressBar"></div>
    <div class="progress-legend"><span class="l-done">已完成</span><span class="l-skip">不需要</span><span class="l-pending">待建</span></div>
  </div>
  <div class="filters" id="filters"></div>

</div>
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>

// --- Render ---
const STATUS_MAP = { done:{label:'已完成',cls:'badge-done'}, skip:{label:'不需要',cls:'badge-skip'}, pending:{label:'待建',cls:'badge-pending'} };
const COMPLEXITY_MAP = { simple:{label:'簡單',cls:'badge-simple'}, medium:{label:'中等',cls:'badge-medium'}, complex:{label:'複雜',cls:'badge-complex'} };
const GROUP_MAP = { backend:'Backend', plugin:'Plugin', other:'Other' };
const TARGET_MAP = { common:{label:'common-starters',cls:'badge-done'}, business:{label:'business-starters',cls:'badge-medium'}, app:{label:'消費端自行實作',cls:'badge-pending'}, microservice:{label:'獨立微服務',cls:'badge-skip'}, skip:{label:'—',cls:''} };
let filter = 'all';

function render() {
  const done=modules.filter(m=>m.status==='done').length, skip=modules.filter(m=>m.status==='skip').length, pending=modules.filter(m=>m.status==='pending').length, total=modules.length;
  const commonCnt=modules.filter(m=>m.target==='common').length, bizCnt=modules.filter(m=>m.target==='business').length;
  const need=done+pending;
  document.getElementById('stats').innerHTML=[{n:need,l:'需遷移',c:'var(--primary)'},{n:done,l:'已完成',c:'var(--success)'},{n:pending,l:'待建',c:'var(--warning)'},{n:Math.round(done/need*100)+'%',l:'完成率',c:'var(--primary)'}].map(s=>`<div class="stat-card"><div class="stat-num" style="color:${s.c}">${s.n}</div><div class="stat-label">${s.l}</div></div>`).join('');
  document.getElementById('progressBar').innerHTML=`<div class="done" style="width:${done/total*100}%"></div><div class="skip" style="width:${skip/total*100}%"></div><div class="pending" style="width:${pending/total*100}%"></div>`;
  const fs=[
    {key:'all',label:`全部 (${total})`},
    {key:'done',label:`已完成 (${done})`},
    {key:'skip',label:`不需要 (${skip})`},
    {key:'pending',label:`待建 (${pending})`},
    {key:'_sep'},
    {key:'common',label:`Common (${commonCnt})`},
    {key:'business',label:`Business (${bizCnt})`},
  ];
  document.getElementById('filters').innerHTML=fs.map(f=>{
    if(f.key==='_sep') return '<span style="border-left:1px solid var(--border);margin:0 4px"></span>';
    return `<button class="${filter===f.key?'active':''}" onclick="setFilter('${f.key}')">${f.label}</button>`;
  }).join('');
  let filtered;
  if(filter==='all') filtered=modules;
  else if(filter==='common'||filter==='business') filtered=modules.filter(m=>m.target===filter);
  else filtered=modules.filter(m=>m.status===filter);
  document.getElementById('tbody').innerHTML=filtered.map(m=>{
    const st=STATUS_MAP[m.status], cx=COMPLEXITY_MAP[m.complexity], tg=TARGET_MAP[m.target];
    const click=m.detail?`class="clickable" onclick="openModal('${m.name}')"` :'';
    return `<tr ${click}><td><strong>${m.name}</strong></td><td>${m.purpose}</td><td><span class="badge ${st.cls}">${st.label}</span></td><td>${tg&&tg.label!=='—'?`<span class="badge ${tg.cls}">${tg.label}</span>`:'<span style="color:#d1d5db">—</span>'}</td><td>${m.springBoot&&m.springBoot!=='—'?`<code style="font-size:12px">${m.springBoot}</code>`:(cx?`<span class="badge ${cx.cls}">${cx.label}</span>`:'<span style="color:#d1d5db">—</span>')}</td></tr>`;
  }).join('');
}

function setFilter(f){filter=f;render();}

function renderList(arr){return arr.map(x=>`<li>${x}</li>`).join('');}

function openModal(name) {
  const m=modules.find(x=>x.name===name);
  if(!m||!m.detail) return;
  const d=m.detail, st=STATUS_MAP[m.status], cx=COMPLEXITY_MAP[m.complexity];

  if(m.status==='done') {
    // 三分頁 Modal
    document.getElementById('modalContent').innerHTML=`
      <button class="close-btn" onclick="closeModal()">&times;</button>
      <h2>${m.name}</h2>
      <div class="modal-sub">${m.purpose} → <code>${m.springBoot}</code> &nbsp; <span class="badge ${st.cls}">${st.label}</span></div>
      <div class="modal-tabs">
        <button class="active" onclick="switchTab(this,'tab-original')">Grails 原始功能</button>
        <button onclick="switchTab(this,'tab-improve')">改進部分</button>
        <button onclick="switchTab(this,'tab-final')">最終功能</button>
      </div>
      <div id="tab-original" class="tab-content active">
        <section><h3>原始功能</h3><ul>${renderList(d.original.features)}</ul></section>
        <section><h3>核心檔案</h3><ul>${d.original.files.map(f=>`<li><code>${f}</code></li>`).join('')}</ul></section>
        ${d.original.deps.length?`<section><h3>依賴</h3><div class="dep-list">${d.original.deps.map(x=>`<span class="dep-tag">${x}</span>`).join('')}</div></section>`:''}
        ${d.original.tables.length?`<section><h3>資料庫表</h3><ul>${d.original.tables.map(t=>`<li><code>${t}</code></li>`).join('')}</ul></section>`:''}
      </div>
      <div id="tab-improve" class="tab-content">
        <section><h3>改進清單</h3>
          <div style="display:flex;flex-direction:column;gap:8px">
            ${d.improvements.map(imp=>{
              const parts=imp.split('→');
              if(parts.length===2) return `<div class="improve-box"><span style="color:#991b1b;text-decoration:line-through">${parts[0].trim()}</span> → <strong style="color:#166534">${parts[1].trim()}</strong></div>`;
              return `<div class="improve-box">${imp}</div>`;
            }).join('')}
          </div>
        </section>
      </div>
      <div id="tab-final" class="tab-content">
        <section><h3>Spring Boot 最終功能</h3><ul>${renderList(d.final.features)}</ul></section>
        ${d.final.config?`<section><h3>設定屬性</h3><div class="rec-box"><code>${d.final.config}</code></div></section>`:''}
      </div>`;
  } else {
    // 待建 Modal（單頁）
    const p=d.pending;
    document.getElementById('modalContent').innerHTML=`
      <button class="close-btn" onclick="closeModal()">&times;</button>
      <h2>${m.name}</h2>
      <div class="modal-sub">${m.purpose} &nbsp; <span class="badge ${st.cls}">${st.label}</span> ${cx?`<span class="badge ${cx.cls}">${cx.label}</span>`:''}</div>
      <div class="info-grid"><div class="info-item"><dt>預估工時</dt><dd>${p.days}</dd></div><div class="info-item"><dt>使用情況</dt><dd>${p.usage}</dd></div></div>
      <section><h3>功能說明</h3><p>${p.desc}</p></section>
      <section><h3>核心功能</h3><ul>${renderList(p.features)}</ul></section>
      <section><h3>核心檔案</h3><ul>${p.files.map(f=>`<li><code>${f}</code></li>`).join('')}</ul></section>
      ${p.tables.length?`<section><h3>資料庫表</h3><ul>${p.tables.map(t=>`<li><code>${t}</code></li>`).join('')}</ul></section>`:''}
      <section><h3>依賴</h3><div class="dep-list">${p.deps.map(x=>`<span class="dep-tag">${x}</span>`).join('')}</div></section>
      <section><h3>遷移建議</h3><div class="rec-box">${p.recommendation}</div></section>`;
  }
  document.getElementById('modalOverlay').style.display='flex';
}

function switchTab(btn, tabId) {
  btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  btn.closest('.modal').querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
}

function closeModal(){document.getElementById('modalOverlay').style.display='none';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
render();
</script>
